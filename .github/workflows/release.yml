name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexterm/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            nexterm/src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('nexterm/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            patchelf

      - name: Install OpenSSL x86_64 for macOS Intel cross-compilation
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          arch -x86_64 /usr/local/bin/brew install openssl@3 || true
          echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: nexterm
        run: npm ci

      - name: Verify assets
        working-directory: nexterm
        shell: bash
        run: |
          ls public/fonts/*.woff2
          ls src-tauri/icons/icon.ico src-tauri/icons/icon.icns src-tauri/icons/icon.png

      - name: Build Tauri app (signed for updater)
        working-directory: nexterm
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Windows artifacts
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig

      - name: Upload macOS ARM artifacts
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-installers
          path: |
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS Intel artifacts
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-installers
          path: |
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for Tauri updater
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="FomoDonkey/NovaShell"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signature files (contain multiline minisign data)
          read_sig() {
            local sig_file="$1"
            if [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          WIN_NSIS_SIG=$(read_sig "$(find artifacts/windows-installers -name '*.exe.sig' 2>/dev/null | head -1)")
          MACOS_ARM_SIG=$(read_sig "$(find artifacts/macos-arm-installers -name '*.app.tar.gz.sig' 2>/dev/null | head -1)")
          MACOS_INTEL_SIG=$(read_sig "$(find artifacts/macos-intel-installers -name '*.app.tar.gz.sig' 2>/dev/null | head -1)")
          LINUX_SIG=$(read_sig "$(find artifacts/linux-installers -name '*.AppImage.sig' 2>/dev/null | head -1)")

          # Find actual filenames
          WIN_NSIS=$(find artifacts/windows-installers -name "*.exe" ! -name "*.sig" 2>/dev/null | head -1 | xargs -r basename)
          MACOS_ARM_TAR=$(find artifacts/macos-arm-installers -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1 | xargs -r basename)
          MACOS_INTEL_TAR=$(find artifacts/macos-intel-installers -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1 | xargs -r basename)
          LINUX_APPIMAGE=$(find artifacts/linux-installers -name "*.AppImage" ! -name "*.sig" 2>/dev/null | head -1 | xargs -r basename)

          # Build JSON with jq to properly escape multiline signatures
          jq -n \
            --arg version "$VERSION" \
            --arg notes "NovaShell ${TAG} — see release notes for details." \
            --arg pub_date "$DATE" \
            --arg win_sig "$WIN_NSIS_SIG" \
            --arg win_url "${BASE_URL}/${WIN_NSIS}" \
            --arg mac_arm_sig "$MACOS_ARM_SIG" \
            --arg mac_arm_url "${BASE_URL}/${MACOS_ARM_TAR}" \
            --arg mac_intel_sig "$MACOS_INTEL_SIG" \
            --arg mac_intel_url "${BASE_URL}/${MACOS_INTEL_TAR}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "${BASE_URL}/${LINUX_APPIMAGE}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_intel_sig, url: $mac_intel_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'NovaShell ${{ github.ref_name }}'
          draft: true
          prerelease: false
          body: |
            ## NovaShell ${{ github.ref_name }}

            Download the installer for your platform below.
            **Auto-update:** Existing installations will be notified automatically.

            ### Windows
            - `.exe` - NSIS installer (recommended)
            - `.msi` - Windows Installer

            ### macOS
            - `.dmg (aarch64)` - Apple Silicon (M1/M2/M3/M4)
            - `.dmg (x64)` - Intel Mac

            ### Linux
            - `.AppImage` - Portable (no install needed)
            - `.deb` - Debian/Ubuntu
            - `.rpm` - Fedora/RHEL
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
