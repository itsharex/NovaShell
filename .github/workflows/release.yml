name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexterm/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            nexterm/src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('nexterm/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            patchelf

      - name: Install OpenSSL x86_64 for macOS Intel cross-compilation
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          arch -x86_64 /usr/local/bin/brew install openssl@3 || true
          echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/local/opt/openssl@3/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: nexterm
        run: npm ci

      - name: Verify assets
        working-directory: nexterm
        shell: bash
        run: |
          ls public/fonts/*.woff2
          ls src-tauri/icons/icon.ico src-tauri/icons/icon.icns src-tauri/icons/icon.png

      - name: Build Tauri app
        working-directory: nexterm
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Sign updater artifacts
        working-directory: nexterm
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "=== Bundle directory contents ==="
          find "$BUNDLE_DIR" -type f 2>/dev/null | sort

          # Sign NSIS exe (Windows updater format)
          for f in "$BUNDLE_DIR"/nsis/*.exe; do
            [ -f "$f" ] && echo "Signing $f" && npx tauri signer sign "$f" && echo "Created ${f}.sig"
          done

          # Sign .app.tar.gz (macOS updater format)
          for f in "$BUNDLE_DIR"/macos/*.app.tar.gz; do
            [ -f "$f" ] && echo "Signing $f" && npx tauri signer sign "$f" && echo "Created ${f}.sig"
          done

          # Sign AppImage (Linux updater format)
          for f in "$BUNDLE_DIR"/appimage/*.AppImage; do
            [ -f "$f" ] && echo "Signing $f" && npx tauri signer sign "$f" && echo "Created ${f}.sig"
          done

          echo "=== After signing ==="
          find "$BUNDLE_DIR" -name "*.sig" -type f 2>/dev/null | sort

      - name: Upload Windows artifacts
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            nexterm/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig

      - name: Upload macOS ARM artifacts
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-installers
          path: |
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            nexterm/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS Intel artifacts
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-installers
          path: |
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            nexterm/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            nexterm/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json for Tauri updater
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="FomoDonkey/NovaShell"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== Looking for signature files ==="
          find artifacts -name "*.sig" -type f 2>/dev/null
          echo "=== Looking for updater files ==="
          find artifacts -name "*.exe" -o -name "*.app.tar.gz" -o -name "*.AppImage" | grep -v ".sig" | sort

          # Read signature from file, return empty if not found
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Find file by pattern, return basename
          find_file() {
            local pattern="$1"
            local found
            found=$(find artifacts -name "$pattern" -type f 2>/dev/null | grep -v ".sig" | head -1)
            if [ -n "$found" ]; then
              basename "$found"
            else
              echo ""
            fi
          }

          # Windows: NSIS .exe + .exe.sig
          WIN_NSIS=$(find_file "*.exe")
          WIN_NSIS_SIG=$(read_sig "*.exe.sig")

          # macOS ARM: .app.tar.gz + .app.tar.gz.sig
          MACOS_ARM_TAR=""
          MACOS_ARM_SIG=""
          ARM_TAR=$(find artifacts/macos-arm-installers -name "*.app.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$ARM_TAR" ]; then
            MACOS_ARM_TAR=$(basename "$ARM_TAR")
            ARM_SIG="${ARM_TAR}.sig"
            if [ -f "$ARM_SIG" ]; then
              MACOS_ARM_SIG=$(cat "$ARM_SIG")
            fi
          fi

          # macOS Intel: .app.tar.gz + .app.tar.gz.sig
          MACOS_INTEL_TAR=""
          MACOS_INTEL_SIG=""
          INTEL_TAR=$(find artifacts/macos-intel-installers -name "*.app.tar.gz" ! -name "*.sig" -type f 2>/dev/null | head -1)
          if [ -n "$INTEL_TAR" ]; then
            MACOS_INTEL_TAR=$(basename "$INTEL_TAR")
            INTEL_SIG="${INTEL_TAR}.sig"
            if [ -f "$INTEL_SIG" ]; then
              MACOS_INTEL_SIG=$(cat "$INTEL_SIG")
            fi
          fi

          # Linux: .AppImage + .AppImage.sig
          LINUX_APPIMAGE=$(find_file "*.AppImage")
          LINUX_SIG=$(read_sig "*.AppImage.sig")

          echo "=== Resolved files ==="
          echo "WIN: $WIN_NSIS (sig: ${#WIN_NSIS_SIG} chars)"
          echo "MAC ARM: $MACOS_ARM_TAR (sig: ${#MACOS_ARM_SIG} chars)"
          echo "MAC INTEL: $MACOS_INTEL_TAR (sig: ${#MACOS_INTEL_SIG} chars)"
          echo "LINUX: $LINUX_APPIMAGE (sig: ${#LINUX_SIG} chars)"

          # Fetch real release notes from the tag's body on GitHub
          RELEASE_NOTES=""
          RELEASE_NOTES=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.body // ""' 2>/dev/null || echo "")
          if [ -z "$RELEASE_NOTES" ]; then
            # Fallback: extract from git tag annotation or commit message
            RELEASE_NOTES=$(git tag -l --format='%(contents)' "${TAG}" 2>/dev/null | head -50 || echo "")
          fi
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Bug fixes, performance improvements, and new features."
          fi
          # Truncate to 2000 chars to keep JSON manageable
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | head -c 2000)

          # Build JSON with jq — notes now contains REAL release content
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$RELEASE_NOTES" \
            --arg pub_date "$DATE" \
            --arg win_sig "$WIN_NSIS_SIG" \
            --arg win_url "${BASE_URL}/${WIN_NSIS}" \
            --arg mac_arm_sig "$MACOS_ARM_SIG" \
            --arg mac_arm_url "${BASE_URL}/${MACOS_ARM_TAR}" \
            --arg mac_intel_sig "$MACOS_INTEL_SIG" \
            --arg mac_intel_url "${BASE_URL}/${MACOS_INTEL_TAR}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "${BASE_URL}/${LINUX_APPIMAGE}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_intel_sig, url: $mac_intel_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url }
              }
            }' > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

          # Validate that signatures are not empty
          WIN_SIG_LEN=$(jq -r '.platforms."windows-x86_64".signature | length' latest.json)
          if [ "$WIN_SIG_LEN" -eq 0 ]; then
            echo "::warning::Windows signature is empty! Updater will fail for Windows."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'NovaShell ${{ github.ref_name }}'
          draft: false
          prerelease: false
          body: |
            ## NovaShell ${{ github.ref_name }}

            Download the installer for your platform below.
            **Auto-update:** Existing installations will be notified automatically.

            ### Windows
            - `.exe` - NSIS installer (recommended)
            - `.msi` - Windows Installer

            ### macOS
            - `.dmg (aarch64)` - Apple Silicon (M1/M2/M3/M4)
            - `.dmg (x64)` - Intel Mac

            ### Linux
            - `.AppImage` - Portable (no install needed)
            - `.deb` - Debian/Ubuntu
            - `.rpm` - Fedora/RHEL
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
